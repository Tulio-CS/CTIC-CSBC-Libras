<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#08090a" />
  <title>LIBRAS ao Vivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08090a;
      --surface:  #111318;
      --surface2: #1a1d24;
      --border:   #252830;
      --border2:  #2e3240;
      --accent:   #5b7fff;
      --accent2:  #3d5ce8;
      --green:    #22c97a;
      --yellow:   #f5c542;
      --red:      #f24444;
      --text:     #f0f2f8;
      --muted:    #6b7280;
      --muted2:   #9ca3af;
      --r:        12px;
      --r2:       8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logo-mark svg { width: 16px; height: 16px; fill: #fff; }

    #header h1 {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--text);
    }

    #header h1 span {
      color: var(--muted);
      font-weight: 500;
    }

    /* Connection pill */
    #conn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted2);
      transition: color .3s, border-color .3s;
    }

    #conn-pill.connected   { color: var(--green); border-color: #22c97a40; }
    #conn-pill.connecting  { color: var(--yellow); border-color: #f5c54240; }
    #conn-pill.disconnected{ color: var(--red);    border-color: #f2444440; }

    #conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    #conn-pill.connecting #conn-dot { animation: blink 1s infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }

    /* ── Camera ──────────────────────────────────────────────────────── */
    #camera-wrap {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      min-height: 0;
    }

    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* Canvas NOT css-flipped — we handle x manually in drawHands */
    #canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Buffer progress — thin line at very top of camera */
    #buffer-track {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      z-index: 5;
    }
    #buffer-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .08s linear;
      box-shadow: 0 0 8px var(--accent);
    }

    /* Hands badge */
    #hands-badge {
      position: absolute;
      top: 12px; right: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(8,9,10,.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      transition: color .2s, border-color .2s;
    }
    #hands-badge.detected { color: var(--green); border-color: #22c97a40; }

    #hands-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Prediction panel ────────────────────────────────────────────── */
    #pred-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 18px 18px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Main row: big label + confidence */
    #pred-main {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    #pred-label {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      color: var(--green);
      transition: color .2s;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #pred-label.uncertain { color: var(--border2); }
    #pred-label.low       { color: var(--yellow); }

    #conf-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
      padding-bottom: 4px;
    }
    #pred-conf-pct {
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted2);
      font-variant-numeric: tabular-nums;
    }
    #conf-track {
      width: 72px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #conf-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: var(--green);
      transition: width .18s, background .18s;
    }

    /* ── Divider ─────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      border-radius: 1px;
    }

    /* ── Top-3 ───────────────────────────────────────────────────────── */
    #top3 {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .t3-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .t3-name {
      width: 90px;
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .t3-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .t3-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width .18s;
    }
    .t3-pct {
      width: 38px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Controls ────────────────────────────────────────────────────── */
    #controls {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 11px 14px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted2);
      font-family: inherit;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.01em;
    }
    button:active { background: var(--border); color: var(--text); }

    button.primary {
      background: var(--accent2);
      border-color: var(--accent);
      color: #fff;
    }
    button.primary:active { background: var(--accent); }

    /* ── Loading overlay ─────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading-logo {
      width: 52px; height: 52px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #loading-logo svg { width: 28px; height: 28px; fill: var(--accent); }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 500;
      text-align: center;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted2);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-logo">
    <svg viewBox="0 0 24 24"><path d="M6 2a2 2 0 0 0-2 2v1H3a1 1 0 0 0 0 2h1v2H3a1 1 0 0 0 0 2h1v2H3a1 1 0 0 0 0 2h1v1a2 2 0 0 0 2 2h1v1a1 1 0 0 0 2 0v-1h2v1a1 1 0 0 0 2 0v-1h1a2 2 0 0 0 2-2v-1h1a1 1 0 0 0 0-2h-1v-2h1a1 1 0 0 0 0-2h-1V7h1a1 1 0 0 0 0-2h-1V4a2 2 0 0 0-2-2H6zm0 2h12v12H6V4zm2 2v8h8V6H8zm2 2h4v4h-4V8z"/></svg>
  </div>
  <div class="spinner"></div>
  <div id="loading-msg">Carregando MediaPipe…</div>
</div>

<div id="toast"></div>

<div id="app">

  <div id="header">
    <div id="header-left">
      <div id="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M8 3a1 1 0 0 0-1 1v5H6a1 1 0 0 0 0 2h1v1a1 1 0 0 0 2 0v-1h1v1a1 1 0 0 0 2 0v-1h.5a2.5 2.5 0 0 0 0-5H12V4a1 1 0 0 0-1-1H8zm0 2h1v3H8V5zm3 0h1v3h-1V5zm2.5 3H16a.5.5 0 0 1 0 1H12V8h1.5zM5 14a1 1 0 0 0-1 1v4a4 4 0 0 0 8 0v-4a1 1 0 0 0-2 0v4a2 2 0 0 1-4 0v-4a1 1 0 0 0-1-1zm10 0a1 1 0 0 0-1 1v6a1 1 0 0 0 2 0v-6a1 1 0 0 0-1-1z"/></svg>
      </div>
      <h1>LIBRAS <span>ao Vivo</span></h1>
    </div>
    <div id="conn-pill" class="connecting">
      <div id="conn-dot"></div>
      <span id="conn-label">Conectando</span>
    </div>
  </div>

  <div id="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="buffer-track"><div id="buffer-fill"></div></div>
    <div id="hands-badge">
      <div id="hands-dot"></div>
      <span id="hands-text">Sem mãos</span>
    </div>
  </div>

  <div id="pred-panel">

    <div id="pred-main">
      <div id="pred-label" class="uncertain">—</div>
      <div id="conf-group">
        <span id="pred-conf-pct">0%</span>
        <div id="conf-track"><div id="conf-bar"></div></div>
      </div>
    </div>

    <div class="divider"></div>

    <div id="top3">
      <div class="t3-row" id="t3-0">
        <span class="t3-name">—</span>
        <div class="t3-track"><div class="t3-bar" style="width:0%"></div></div>
        <span class="t3-pct">—</span>
      </div>
      <div class="t3-row" id="t3-1">
        <span class="t3-name">—</span>
        <div class="t3-track"><div class="t3-bar" style="width:0%"></div></div>
        <span class="t3-pct">—</span>
      </div>
      <div class="t3-row" id="t3-2">
        <span class="t3-name">—</span>
        <div class="t3-track"><div class="t3-bar" style="width:0%"></div></div>
        <span class="t3-pct">—</span>
      </div>
    </div>

    <div id="controls">
      <button id="btn-reset">Resetar buffer</button>
      <button id="btn-cam" class="primary">Câmera traseira</button>
    </div>

  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── Config ────────────────────────────────────────────────────────────────────
const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/ws`;
})();

const CONF_THRESH  = 0.30;
const SEND_EVERY_N = 1;

// ── DOM ───────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const video      = $('video');
const canvas     = $('canvas');
const ctx        = canvas.getContext('2d');
const loading    = $('loading');
const loadingMsg = $('loading-msg');
const predLabel  = $('pred-label');
const confPct    = $('pred-conf-pct');
const confBar    = $('conf-bar');
const bufFill    = $('buffer-fill');
const connPill   = $('conn-pill');
const connLabel  = $('conn-label');
const handsBadge = $('hands-badge');
const handsText  = $('hands-text');
const toast      = $('toast');

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, ms = 2200) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, wsReady = false;

function setConn(state) {
  connPill.className = state;
  const labels = { connected: 'Online', connecting: 'Conectando', disconnected: 'Offline' };
  connLabel.textContent = labels[state] || state;
}

function connectWS() {
  setConn('connecting');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => { wsReady = true; setConn('connected'); };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.reset || msg.error) return;

    // Buffer progress
    const pct = msg.buffer_need > 0 ? (msg.buffer_fill / msg.buffer_need) * 100 : 0;
    bufFill.style.width = pct + '%';

    const pred = msg.pred;
    const conf = msg.conf ?? 0;
    const confPctVal = Math.round(conf * 100);

    if (pred && pred !== '?') {
      predLabel.textContent = pred;
      predLabel.className   = conf >= CONF_THRESH ? '' : 'low';
    } else {
      predLabel.textContent = '—';
      predLabel.className   = 'uncertain';
    }

    confPct.textContent  = confPctVal + '%';
    confBar.style.width  = confPctVal + '%';
    confBar.style.background =
      conf >= 0.65 ? 'var(--green)' :
      conf >= CONF_THRESH ? 'var(--yellow)' : 'var(--red)';

    // Top-3
    const top3 = msg.top3 ? Object.entries(msg.top3) : [];
    for (let i = 0; i < 3; i++) {
      const row  = $('t3-' + i);
      const name = row.querySelector('.t3-name');
      const bar  = row.querySelector('.t3-bar');
      const pctEl= row.querySelector('.t3-pct');
      if (top3[i]) {
        const [label, val] = top3[i];
        name.textContent  = label;
        bar.style.width   = Math.round(val * 100) + '%';
        pctEl.textContent = Math.round(val * 100) + '%';
      } else {
        name.textContent  = '—';
        bar.style.width   = '0%';
        pctEl.textContent = '—';
      }
    }
  };

  ws.onclose = () => {
    wsReady = false;
    setConn('disconnected');
    setTimeout(connectWS, 2500);
  };

  ws.onerror = () => ws.close();
}

function sendLandmarks(lm) {
  if (wsReady && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ landmarks: lm }));
  }
}

// ── MediaPipe ─────────────────────────────────────────────────────────────────
let handLandmarker = null;

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

async function initMediaPipe() {
  loadingMsg.textContent = 'Carregando MediaPipe…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numHands: 2,
    minHandDetectionConfidence: 0.5,
    minHandPresenceConfidence:  0.5,
    minTrackingConfidence:      0.5,
  });
}

// ── Feature extraction ────────────────────────────────────────────────────────
// Deve replicar exatamente o que infer_live.py faz:
//   - infer_live.py faz cv2.flip(frame, 1) antes do MediaPipe → x espelhado
//   - Câmera frontal no browser: x do frame raw está espelhado em relação ao
//     frame flippado do desktop → inverter x (1.0 - x) para corrigir
//   - Câmera traseira: MediaPipe assume entrada espelhada mas câmera traseira
//     não é espelhada → handedness swapped, x correto sem inversão
// Ordem de saída: [right(63), left(63)] — igual collect_data.py e infer_live.py

function extractLandmarks(results, isFront) {
  const right = new Float32Array(63);
  const left  = new Float32Array(63);

  if (results.landmarks && results.handedness) {
    for (let i = 0; i < results.landmarks.length; i++) {
      const lms   = results.landmarks[i];
      const label = results.handedness[i][0].categoryName; // 'Left' | 'Right'

      const vec = new Float32Array(63);
      for (let j = 0; j < 21; j++) {
        // Câmera frontal: invertemos x para coincidir com o frame flippado
        // do desktop (onde o modelo foi treinado).
        // Câmera traseira: x já está correto, mas handedness é trocado abaixo.
        vec[j * 3]     = isFront ? 1.0 - lms[j].x : lms[j].x;
        vec[j * 3 + 1] = lms[j].y;
        vec[j * 3 + 2] = lms[j].z;
      }

      // Câmera traseira: MediaPipe assume entrada espelhada → labels trocados
      const isRight = isFront ? (label === 'Right') : (label === 'Left');
      if (isRight) right.set(vec);
      else          left.set(vec);
    }
  }

  const out = new Float32Array(126);
  out.set(right, 0);
  out.set(left, 63);
  return Array.from(out);
}

// ── Skeleton overlay ──────────────────────────────────────────────────────────
// Canvas NÃO tem CSS flip. Espelhamos x manualmente para câmera frontal
// (onde o video tem scaleX(-1)), de modo que o esqueleto fique sobre a mão.

// Calcula o offset e escala causados pelo object-fit: cover.
// O MediaPipe processa o frame completo (videoWidth x videoHeight),
// mas o canvas cobre a área visível (que pode estar cropada/escalada).
function getCoverTransform() {
  const vw = video.videoWidth  || video.clientWidth;
  const vh = video.videoHeight || video.clientHeight;
  const cw = canvas.width;
  const ch = canvas.height;
  const scale   = Math.max(cw / vw, ch / vh);
  const scaledW = vw * scale;
  const scaledH = vh * scale;
  const offX    = (cw - scaledW) / 2;
  const offY    = (ch - scaledH) / 2;
  return { scaledW, scaledH, offX, offY };
}

function drawHands(results, isFront) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (!results.landmarks) return;

  const { scaledW, scaledH, offX, offY } = getCoverTransform();

  // Mapeia coordenadas normalizadas [0,1] do frame completo
  // para a posição real no canvas (levando em conta o crop do object-fit: cover
  // e o espelho da câmera frontal).
  const cx = (lm) => (isFront ? (1 - lm.x) : lm.x) * scaledW + offX;
  const cy = (lm) => lm.y * scaledH + offY;

  results.landmarks.forEach((lms, hi) => {
    const baseColor = hi === 0 ? '#5b7fff' : '#a78bfa';

    // Conexões
    ctx.strokeStyle = baseColor + 'bb';
    ctx.lineWidth   = 1.8;
    ctx.lineCap     = 'round';
    for (const [a, b] of CONNECTIONS) {
      ctx.beginPath();
      ctx.moveTo(cx(lms[a]), cy(lms[a]));
      ctx.lineTo(cx(lms[b]), cy(lms[b]));
      ctx.stroke();
    }

    // Pontos
    lms.forEach((lm, idx) => {
      const isWrist = idx === 0;
      const isTip   = [4,8,12,16,20].includes(idx);
      const r = isWrist ? 5.5 : isTip ? 4 : 2.8;
      ctx.beginPath();
      ctx.arc(cx(lm), cy(lm), r, 0, Math.PI * 2);
      ctx.fillStyle = isWrist ? '#fff' : isTip ? baseColor : baseColor + '99';
      ctx.fill();
    });
  });
}

// ── Camera ────────────────────────────────────────────────────────────────────
let useFront = true;
let frameCount = 0, animId = null;

async function startCamera() {
  if (animId) cancelAnimationFrame(animId);
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());

  // Aplica CSS flip só para câmera frontal (efeito espelho natural)
  video.style.transform = useFront ? 'scaleX(-1)' : 'none';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: useFront ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();
    loop();
  } catch (err) {
    showToast('Erro na câmera: ' + err.message);
  }
}

function resizeCanvas() {
  const r = canvas.getBoundingClientRect();
  if (canvas.width !== r.width || canvas.height !== r.height) {
    canvas.width  = r.width;
    canvas.height = r.height;
  }
}

function loop() {
  if (video.paused || video.ended) { animId = requestAnimationFrame(loop); return; }
  resizeCanvas();

  const results = handLandmarker.detectForVideo(video, performance.now());
  const det     = results.landmarks?.length > 0;

  // Badge
  if (det) {
    handsBadge.classList.add('detected');
    handsText.textContent = results.landmarks.length === 1 ? '1 mão' : '2 mãos';
  } else {
    handsBadge.classList.remove('detected');
    handsText.textContent = 'Sem mãos';
  }

  drawHands(results, useFront);

  if (frameCount++ % SEND_EVERY_N === 0) {
    sendLandmarks(extractLandmarks(results, useFront));
  }

  animId = requestAnimationFrame(loop);
}

// ── Botões ────────────────────────────────────────────────────────────────────
$('btn-reset').addEventListener('click', () => {
  if (wsReady) {
    ws.send(JSON.stringify({ reset: true }));
    predLabel.textContent = '—';
    predLabel.className   = 'uncertain';
    bufFill.style.width   = '0%';
    showToast('Buffer resetado');
  }
});

$('btn-cam').addEventListener('click', () => {
  useFront = !useFront;
  $('btn-cam').textContent = useFront ? 'Câmera traseira' : 'Câmera frontal';
  startCamera();
  showToast(useFront ? 'Câmera frontal ativa' : 'Câmera traseira ativa');
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await initMediaPipe();
    loadingMsg.textContent = 'Acessando câmera…';
    await startCamera();
    loading.classList.add('hidden');
    connectWS();
  } catch (err) {
    loadingMsg.textContent = 'Erro: ' + err.message;
    console.error(err);
  }
})();
</script>
