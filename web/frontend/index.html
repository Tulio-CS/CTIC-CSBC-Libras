<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>LIBRAS ao Vivo</title>

  <!-- MediaPipe Tasks Vision (hand landmark detection no browser) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"
          crossorigin="anonymous"></script>

  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --card:      #1e293b;
      --border:    #334155;
      --green:     #22c55e;
      --yellow:    #eab308;
      --red:       #ef4444;
      --blue:      #3b82f6;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;        /* dynamic viewport height (safe on iOS) */
      gap: 0;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    #header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .03em;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      transition: background .3s;
    }
    #status-dot.connected  { background: var(--green); }
    #status-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ── Camera wrapper ─────────────────────────────────────────────── */
    #camera-wrap {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);   /* espelho — modo selfie */
    }

    #canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);   /* espelho — igual ao video */
      pointer-events: none;
    }

    /* Buffer fill bar (canto superior esquerdo do vídeo) */
    #buffer-bar-wrap {
      position: absolute;
      top: 10px; left: 10px;
      width: 100px;
      background: rgba(0,0,0,.5);
      border-radius: 6px;
      overflow: hidden;
      height: 5px;
    }
    #buffer-bar {
      height: 100%;
      background: var(--blue);
      width: 0%;
      transition: width .1s;
    }

    /* Hands detected indicator */
    #hands-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,.6);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .7rem;
      color: var(--muted);
      transition: color .2s;
    }
    #hands-badge.detected { color: var(--green); }

    /* ── Prediction panel ───────────────────────────────────────────── */
    #pred-panel {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Main prediction */
    #pred-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #pred-label {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: .02em;
      color: var(--green);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .25s;
    }
    #pred-label.uncertain { color: var(--muted); }

    #pred-conf-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    #pred-conf-pct {
      font-size: .85rem;
      font-weight: 700;
      color: var(--muted);
    }
    #conf-bar-bg {
      width: 80px; height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    #conf-bar {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width .2s, background .2s;
      border-radius: 3px;
    }

    /* Top-3 */
    #top3 {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .top3-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top3-label {
      width: 80px;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .top3-bar-bg {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .top3-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width .2s;
    }
    .top3-pct {
      font-size: .7rem;
      color: var(--muted);
      width: 36px;
      text-align: right;
    }

    /* ── Controls ───────────────────────────────────────────────────── */
    #controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: var(--border); }
    button.primary { background: var(--blue); border-color: var(--blue); }

    /* ── Loading overlay ────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }
    #loading.hidden { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg { color: var(--muted); font-size: .9rem; text-align: center; }

    /* ── Toast ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293bee; border: 1px solid var(--border);
      color: var(--text); padding: 8px 18px;
      border-radius: 999px; font-size: .82rem;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Carregando MediaPipe…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<div id="app">

  <!-- Header -->
  <div id="header">
    <h1>🤟 LIBRAS ao Vivo</h1>
    <div style="display:flex; align-items:center; gap:8px;">
      <span id="status-label" style="font-size:.75rem; color:var(--muted)">Conectando…</span>
      <div id="status-dot" class="connecting"></div>
    </div>
  </div>

  <!-- Camera -->
  <div id="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="buffer-bar-wrap">
      <div id="buffer-bar"></div>
    </div>
    <div id="hands-badge">✋ —</div>
  </div>

  <!-- Prediction panel -->
  <div id="pred-panel">

    <!-- Main prediction -->
    <div id="pred-main">
      <div id="pred-label" class="uncertain">…</div>
      <div id="pred-conf-wrap">
        <span id="pred-conf-pct">0%</span>
        <div id="conf-bar-bg"><div id="conf-bar"></div></div>
      </div>
    </div>

    <!-- Top 3 -->
    <div id="top3">
      <div class="top3-row" id="t3-0">
        <span class="top3-label">—</span>
        <div class="top3-bar-bg"><div class="top3-bar" style="width:0%"></div></div>
        <span class="top3-pct">0%</span>
      </div>
      <div class="top3-row" id="t3-1">
        <span class="top3-label">—</span>
        <div class="top3-bar-bg"><div class="top3-bar" style="width:0%"></div></div>
        <span class="top3-pct">0%</span>
      </div>
      <div class="top3-row" id="t3-2">
        <span class="top3-label">—</span>
        <div class="top3-bar-bg"><div class="top3-bar" style="width:0%"></div></div>
        <span class="top3-pct">0%</span>
      </div>
    </div>

    <!-- Botões -->
    <div id="controls">
      <button id="btn-reset">🔄 Resetar</button>
      <button id="btn-cam" class="primary">📷 Câmera traseira</button>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Config
// ═══════════════════════════════════════════════════════════════════════════

const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/ws`;
})();

const CONF_THRESH  = 0.30;
const SEND_EVERY_N = 1;     // envia a cada N frames (1 = máximo de fluidez)

// ═══════════════════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const video       = $('video');
const canvas      = $('canvas');
const ctx         = canvas.getContext('2d');
const loading     = $('loading');
const loadingMsg  = $('loading-msg');
const statusDot   = $('status-dot');
const statusLabel = $('status-label');
const predLabel   = $('pred-label');
const predConfPct = $('pred-conf-pct');
const confBar     = $('conf-bar');
const bufferBar   = $('buffer-bar');
const handsBadge  = $('hands-badge');
const toast       = $('toast');

// ═══════════════════════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════════════════════

let toastTimer;
function showToast(msg, ms = 2500) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════════════════

let ws = null;
let wsReady = false;

function connectWS() {
  setStatus('connecting');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('connected');
    showToast('Conectado ao servidor!');
  };

  ws.onclose = () => {
    wsReady = false;
    setStatus('disconnected');
    setTimeout(connectWS, 3000);   // reconecta automaticamente
  };

  ws.onerror = () => {
    setStatus('disconnected');
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.reset) return;
    if (msg.error) { showToast('Erro: ' + msg.error); return; }
    renderPrediction(msg);
  };
}

function setStatus(state) {
  wsReady = state === 'connected';
  statusDot.className = state === 'connected' ? 'connected'
                      : state === 'connecting' ? 'connecting' : '';
  statusLabel.textContent = state === 'connected'   ? 'Online'
                          : state === 'connecting'  ? 'Conectando…'
                          : 'Sem conexão';
}

function sendLandmarks(landmarks) {
  if (!wsReady || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ landmarks }));
}

// ═══════════════════════════════════════════════════════════════════════════
// Prediction UI
// ═══════════════════════════════════════════════════════════════════════════

function renderPrediction(msg) {
  // Buffer progress
  const fill = msg.buffer_need > 0
    ? Math.round((msg.buffer_fill / msg.buffer_need) * 100) : 0;
  bufferBar.style.width = fill + '%';

  if (!msg.pred || msg.pred === '?') {
    predLabel.textContent = msg.buffer_fill < msg.buffer_need ? '…' : '?';
    predLabel.className = 'uncertain';
    predConfPct.textContent = '0%';
    confBar.style.width = '0%';
    return;
  }

  // Main prediction
  const conf = msg.conf;
  predLabel.textContent = msg.pred;
  predLabel.className   = conf >= CONF_THRESH ? '' : 'uncertain';
  predConfPct.textContent = Math.round(conf * 100) + '%';
  confBar.style.width     = Math.round(conf * 100) + '%';
  confBar.style.background = conf >= 0.7 ? 'var(--green)'
                           : conf >= 0.4 ? 'var(--yellow)'
                                         : 'var(--red)';

  // Top-3
  const top3 = Object.entries(msg.top3 || {});
  for (let i = 0; i < 3; i++) {
    const row  = $('t3-' + i);
    if (!row) continue;
    const lbl  = row.querySelector('.top3-label');
    const bar  = row.querySelector('.top3-bar');
    const pct  = row.querySelector('.top3-pct');
    if (top3[i]) {
      const [name, prob] = top3[i];
      lbl.textContent = name;
      bar.style.width = Math.round(prob * 100) + '%';
      pct.textContent = Math.round(prob * 100) + '%';
    } else {
      lbl.textContent = '—';
      bar.style.width = '0%';
      pct.textContent = '0%';
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// MediaPipe — HandLandmarker
// ═══════════════════════════════════════════════════════════════════════════

const { HandLandmarker, FilesetResolver } = window;
let handLandmarker = null;

const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],         // polegar
  [0,5],[5,6],[6,7],[7,8],         // indicador
  [0,9],[9,10],[10,11],[11,12],    // médio
  [0,13],[13,14],[14,15],[15,16],  // anelar
  [0,17],[17,18],[18,19],[19,20],  // mínimo
  [5,9],[9,13],[13,17],            // palma
];

async function initMediaPipe() {
  loadingMsg.textContent = 'Carregando MediaPipe…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU',
    },
    runningMode:  'VIDEO',
    numHands:     2,
    minHandDetectionConfidence: 0.5,
    minHandPresenceConfidence:  0.5,
    minTrackingConfidence:      0.5,
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// Feature extraction — mesma convenção do backend Python
// RAW landmarks (sem wrist-centering no cliente — o servidor aplica feature_mode)
// Ordem: [right_raw(63), left_raw(63)]
// ═══════════════════════════════════════════════════════════════════════════

function extractLandmarks(results) {
  const right = new Float32Array(63);  // zeros
  const left  = new Float32Array(63);

  if (results.landmarks && results.handedness) {
    for (let i = 0; i < results.landmarks.length; i++) {
      const lms   = results.landmarks[i];
      const label = results.handedness[i][0].categoryName; // "Left"|"Right"

      const vec = new Float32Array(63);
      for (let j = 0; j < 21; j++) {
        vec[j * 3]     = lms[j].x;
        vec[j * 3 + 1] = lms[j].y;
        vec[j * 3 + 2] = lms[j].z;
      }

      // Sem centering aqui — o servidor (Python) aplica wrist_centered
      if (label === 'Right') right.set(vec);
      else                    left.set(vec);
    }
  }

  const combined = new Float32Array(126);
  combined.set(right, 0);
  combined.set(left, 63);
  return Array.from(combined);
}

// ═══════════════════════════════════════════════════════════════════════════
// Canvas overlay — desenha esqueleto das mãos
// ═══════════════════════════════════════════════════════════════════════════

function drawHands(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!results.landmarks) return;

  const W = canvas.width, H = canvas.height;

  results.landmarks.forEach((lms, hi) => {
    const color = hi === 0 ? '#3b82f6' : '#a855f7';

    // Conexões
    ctx.strokeStyle = color + '99';
    ctx.lineWidth   = 2;
    for (const [a, b] of HAND_CONNECTIONS) {
      ctx.beginPath();
      // canvas espelhado via CSS — coordenadas naturais
      ctx.moveTo(lms[a].x * W, lms[a].y * H);
      ctx.lineTo(lms[b].x * W, lms[b].y * H);
      ctx.stroke();
    }

    // Pontos
    lms.forEach((lm, li) => {
      const isWrist     = li === 0;
      const isTip       = [4,8,12,16,20].includes(li);
      ctx.fillStyle     = isWrist ? '#fff' : isTip ? color : color + 'cc';
      ctx.beginPath();
      ctx.arc(lm.x * W, lm.y * H, isWrist ? 5 : isTip ? 4 : 2.5, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// Camera
// ═══════════════════════════════════════════════════════════════════════════

let useFrontCamera = true;
let frameCount     = 0;
let animFrame      = null;

async function startCamera() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());

  const constraints = {
    video: {
      facingMode: useFrontCamera ? 'user' : 'environment',
      width:  { ideal: 1280 },
      height: { ideal: 720 },
    },
    audio: false,
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();
    renderLoop();
  } catch (err) {
    showToast('Erro na câmera: ' + err.message);
    console.error(err);
  }
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
}

function renderLoop() {
  if (video.paused || video.ended) { animFrame = requestAnimationFrame(renderLoop); return; }

  resizeCanvas();

  const now     = performance.now();
  const results = handLandmarker.detectForVideo(video, now);
  const det     = results.landmarks && results.landmarks.length > 0;

  // Badge de detecção
  handsBadge.textContent = det
    ? `✋ ${results.landmarks.length} mão(s)`
    : '✋ —';
  handsBadge.className = det ? 'detected' : '';

  // Overlay
  drawHands(results);

  // Envia ao servidor
  frameCount++;
  if (frameCount % SEND_EVERY_N === 0) {
    const landmarks = extractLandmarks(results);
    sendLandmarks(landmarks);
  }

  animFrame = requestAnimationFrame(renderLoop);
}

// ═══════════════════════════════════════════════════════════════════════════
// Botões
// ═══════════════════════════════════════════════════════════════════════════

$('btn-reset').addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ reset: true }));
    predLabel.textContent = '…';
    predLabel.className   = 'uncertain';
    showToast('Buffer resetado');
  }
});

$('btn-cam').addEventListener('click', () => {
  useFrontCamera = !useFrontCamera;
  $('btn-cam').textContent = useFrontCamera ? '📷 Câmera traseira' : '📷 Câmera frontal';
  startCamera();
  showToast(useFrontCamera ? 'Câmera frontal' : 'Câmera traseira');
});

// ═══════════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════════

(async () => {
  try {
    await initMediaPipe();
    loadingMsg.textContent = 'Acessando câmera…';
    await startCamera();
    loading.classList.add('hidden');
    connectWS();
  } catch (err) {
    loadingMsg.textContent = 'Erro: ' + err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
