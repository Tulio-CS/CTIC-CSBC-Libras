# web/nginx.conf
# Nginx reverse-proxy para o servidor LIBRAS FastAPI/uvicorn
#
# Instalação na VPS:
#   sudo cp nginx.conf /etc/nginx/sites-available/libras
#   sudo ln -s /etc/nginx/sites-available/libras /etc/nginx/sites-enabled/libras
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # substitua pelo seu domínio ou IP

    # Tamanho máximo de upload (para possível endpoint de imagem futura)
    client_max_body_size 10M;

    # ── Frontend e REST ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para o warm-up inicial do modelo
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket (/ws) ──────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;

        # Cabeçalhos obrigatórios para upgrade WebSocket
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Manter conexão aberta enquanto o usuário estiver usando o app
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
